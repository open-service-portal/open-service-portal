# Flux Kustomizations for the openportal cluster baseplate.
#
# Reconcile order is enforced with dependsOn + wait:
#
#   infra-crds ──► infra-controllers ──► infra-configs
#   (Gateway API   (Traefik /            (wildcard Certificate,
#    CRDs)          GatewayClass)          Gateway, gateway-config)
#
# The "platform" GitRepository is created by scripts/cluster-setup.sh
# (bootstrap_flux_infrastructure).
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-crds
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: platform
  path: ./infrastructure/crds
  prune: true
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-controllers
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-crds
  interval: 1h
  retryInterval: 2m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: platform
  path: ./infrastructure/controllers
  prune: true
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-configs
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-controllers
  interval: 1h
  retryInterval: 2m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: platform
  path: ./infrastructure/configs
  prune: true
  wait: true
