apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 24h
  url: https://traefik.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      # Latest stable chart (bundles Traefik v3.7.6). Requires the Gateway API
      # CRDs to be present first — satisfied by infra-crds (dependsOn).
      # TODO: confirm against the version the live cluster runs.
      version: "41.0.2"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Act as a Gateway API implementation. Registers GatewayClass "traefik"
    # (controllerName traefik.io/gateway-controller). The Gateway object itself
    # is managed in infrastructure/configs, so the chart's Gateway is disabled.
    providers:
      kubernetesGateway:
        enabled: true
      kubernetesIngress:
        enabled: false
    gateway:
      enabled: false
    gatewayClass:
      enabled: true
    # k3s maps ServiceLB 80/443 onto these non-root container ports. The Gateway
    # listeners must target 8000/8443 to match (see configs/gateway.yaml).
    ports:
      web:
        port: 8000
        expose:
          default: true
        exposedPort: 80
        # Redirect HTTP -> HTTPS at the entrypoint.
        # Chart schema nests this under `http.redirections` (NOT ports.web.redirections).
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true
      websecure:
        port: 8443
        expose:
          default: true
        exposedPort: 443
    service:
      type: LoadBalancer
