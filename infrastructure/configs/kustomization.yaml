apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Depends on infra-controllers (Traefik/GatewayClass) and on the imperatively
# installed cert-manager + letsencrypt-prod ClusterIssuer. If cert-manager is
# not yet up when this first reconciles, Flux retries until it is.
resources:
  - wildcard-certificate.yaml
  - gateway.yaml
  - gateway-config.yaml
